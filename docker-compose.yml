services:
  # Backend API Server
  backend:
    build:
      context: ./server
    container_name: projecthub-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: ${MONGO_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: 7d
      NODE_ENV: production
      PORT: 5000
      CLIENT_URL: ${CLIENT_URL}
      SOCKET_IO_CORS: ${SOCKET_IO_CORS}
    networks:
      - projecthub-network
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:5000/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Frontend Application
  frontend:
    build:
      context: ./client
    container_name: projecthub-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://backend:5000/api
    networks:
      - projecthub-network
    healthcheck:
      test: wget --quiet --tries=1 --spider http://localhost:80/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s


networks:
  projecthub-network:
    driver: bridge
